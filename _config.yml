# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: IAN KARANJA PORTFOLIO
email:  iankaranja13763@gmail.com
description: My Portfolio Website — Cybersecurity | Projects | Labs

twitter_username: 
github_username: Karanjaian
minimal_mistakes_skin: default
search: true

# Enable navigation bar in the header
header:
  navigation: true
# Site Navigation Links
navigation:
  - title: "Home"
    url: /
  - title: "Resume"
    url: /resume/
  - title: "Projects"
    url: /projects/
  - title: "Lab Challenges"
    url: /labs/
  - title: "Contact"
    url: /contact/


# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Ian Karanja"
  avatar: "assets/images/Pfp.jpg" 
  bio: "Bachelor of Computer Science student | Aspiring Cybersecurity Professional."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Karanjaian"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/ian-karanja-1867b5367"
    - label: "Credly"
      icon: "fas fa-fw fa-certificate"
      url: "https://www.credly.com/users/ian-karanja.8187a41e"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:iankaranja13763@gmail.com"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# Example navigation:
main:
  - title: "Home"
    url: /
  - title: "Resume"
    url: /resume/
  - title: "Projects"
    url: /projects/
  - title: "Lab Challenges"
    url: /labs/
  - title: "Contact"
    url: /contact/



  
